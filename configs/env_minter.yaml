# params:
#   left_delim: "{{"
#   right_delim: "}}"

nats:
  url: '{{ env "NATS_URL" }}'
  jwt_expiry_bounds:
    min: 1s
    # max: 7d
    # max: 10s

service:
  name: '{{ env "IAM_NAME" }}'
  version: '{{ env "IAM_VERSION" }}'
  description: '{{ env "IAM_DESCRIPTION" }}'
  creds_file: '{{ expandEnv (env "IAM_USER_CREDS") }}'

  account:
    name: '{{ env "IAM_ACCOUNT_NAME" }}'
    signing_nkey: '{{ readFile (expandEnv (env "IAM_ACCOUNT_SIGNK")) }}'
    xkey_seed: '{{ readNthLine 1 (expandEnv (env "IAM_SERVICE_XK")) }}'

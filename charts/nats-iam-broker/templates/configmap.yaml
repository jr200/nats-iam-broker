apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nats-iam-broker.fullname" . }}
  labels: {{- include "nats-iam-broker.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      log_level: {{ .Values.server.log_level }}
      log_format: {{ .Values.server.log_format }}
      log_sensitive: {{ .Values.server.log_sensitive }}
      metrics: {{ .Values.server.metrics }}
      metrics_port: {{ .Values.server.metrics_port }}
      watch: {{ .Values.server.watch }}

    {{- with .Values.config.nats }}
    nats:
      {{- toYaml . | nindent 6 }}
    {{- end }}

    {{- with .Values.config.service }}
    service:
      {{- toYaml . | nindent 6 }}
    {{- end }}

    {{- with .Values.config.idp }}
    idp:
      {{- toYaml . | nindent 6 }}
    {{- end }}

    {{- with .Values.config.rbac }}
    rbac:
      {{- toYaml . | nindent 6 }}
    {{- end }}

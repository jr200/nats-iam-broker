# Default values for nats-iam-broker.

# Number of replicas for the deployment
replicaCount: 1

image:
  # The Docker image repository
  repository: ghcr.io/jr200/nats-iam-broker
  # The image pull policy (Always, IfNotPresent, Never)
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
# Override the default name of the chart
nameOverride: ""
# Override the full name of the chart
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Server operational settings
# These are rendered into the config file's `server:` section
# and also control deployment args, ports, and probes.
# ---------------------------------------------------------------------------
server:
  log_level: info        # disabled, panic, fatal, error, warn, info, debug, trace
  log_format: json       # json or human
  log_sensitive: false   # enable sensitive logging (for debugging)
  metrics: false         # enable Prometheus metrics endpoint
  metrics_port: 8080     # port for the metrics HTTP server
  watch: false           # enable hot-reload of config files via file watching
  serviceMonitor:
    enabled: false       # create a Prometheus ServiceMonitor resource
    interval: 30s        # scrape interval
    labels: {}           # additional labels for the ServiceMonitor

# ---------------------------------------------------------------------------
# Application configuration
# Rendered as a ConfigMap and mounted as /config/config.yaml
# ---------------------------------------------------------------------------
config:
  nats:
    url: "nats://nats:4222"
    jwt_expiry_bounds:
      min: 1m
      max: 24h

  service:
    name: ""          # required
    version: "0.1.0"  # required (semver)
    description: ""   # required
    creds_file: "/secrets/user.creds"
    account:
      name: ""        # required
      # Use Go template expressions for secrets read at runtime:
      #   signing_nkey: '{{ readFile "/secrets/signing.nk" }}'
      signing_nkey: ""
      # xkey_seed: '{{ readNthLine 1 "/secrets/enc.xk" }}'
      xkey_seed: ""

  idp: []
  #  - description: "My Identity Provider"
  #    issuer_url: ""   # required
  #    client_id: ""    # required
  #    validation:
  #      claims: [aud, iat, exp, preferred_username, sub]
  #      aud: []
  #      token_bounds:
  #        min: 1m
  #        max: 43800h

  rbac:
    token_max_expiration: 8h
    role_binding_matching_strategy: best_match
    # auto_accounts_dir: "/secrets"  # optional: scan directory for *-id-1.pub / *-sk-1.nk pairs
    user_accounts: []
    roles: []
    #  - name: streaming
    #    permissions:
    #      sub:
    #        allow: ["$JS.API.>", "_INBOX.>"]
    #      pub:
    #        allow: ["$JS.API.STREAM.CREATE.mystream"]
    #      resp:
    #        max_msgs: 1
    #        exp: 1h
    #    limits:
    #      data: 65536
    role_binding: []
    #  - user_account: APP1
    #    token_max_expiration: 24h
    #    match:
    #      - { claim: aud, value: public }
    #    roles:
    #      - streaming

# ---------------------------------------------------------------------------
# Kubernetes resources
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# For injecting secrets as env vars (e.g., from K8s Secrets)
envFrom: []
  # - secretRef:
  #     name: nats-secrets
env: []

# For mounting secret files
volumes: []
  # - name: nats-secrets
  #   secret:
  #     secretName: nats-secrets
volumeMounts: []
  # - name: nats-secrets
  #   mountPath: /secrets
  #   readOnly: true

repos:
  - repo: local
    hooks:
      - id: sync-shared
        name: sync shared configs
        entry: bash -c 'mkdir -p .shared; [ -x .shared/sync.sh ] || { curl -sfL --max-time 10 "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/sync.sh" -o .shared/sync.sh 2>/dev/null && chmod +x .shared/sync.sh; }; [ -x .shared/sync.sh ] && .shared/sync.sh go; exit 0'
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      # Formatter — runs `golangci-lint fmt` (gofmt + goimports + gofumpt as
      # configured in .shared/.golangci.yml).
      - id: golangci-lint-fmt
        args: [--config=.shared/.golangci.yml]
      # Linter — fast mode (--new-from-rev HEAD). CI runs the full mode.
      - id: golangci-lint
        args: [--config=.shared/.golangci.yml]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
